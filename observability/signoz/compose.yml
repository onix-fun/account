x-common: &common
  networks:
    - account-network
  restart: unless-stopped
  logging:
    options:
      max-size: 50m
      max-file: "3"

x-db-depend: &db-depend
  <<: *common
  depends_on:
    clickhouse:
      condition: service_healthy

services:
  signoz-init-clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    command:
      - bash
      - -c
      - |
        set -euo pipefail
        version="v0.0.1"
        node_os=$$(uname -s | tr '[:upper:]' '[:lower:]')
        node_arch=$$(uname -m | sed s/aarch64/arm64/ | sed s/x86_64/amd64/)
        cd /tmp
        wget -q -O histogram-quantile.tar.gz "https://github.com/SigNoz/signoz/releases/download/histogram-quantile%2F$${version}/histogram-quantile_$${node_os}_$${node_arch}.tar.gz"
        tar -xzf histogram-quantile.tar.gz
        install -m 0755 histogram-quantile /var/lib/clickhouse/user_scripts/histogramQuantile
    restart: on-failure
    volumes:
      - signoz_clickhouse_scripts:/var/lib/clickhouse/user_scripts

  zookeeper-1:
    <<: *common
    image: signoz/zookeeper:3.7.1
    user: root
    environment:
      ZOO_SERVER_ID: "1"
      ALLOW_ANONYMOUS_LOGIN: "yes"
      ZOO_AUTOPURGE_INTERVAL: "1"
      ZOO_ENABLE_PROMETHEUS_METRICS: "yes"
      ZOO_PROMETHEUS_METRICS_PORT_NUMBER: "9141"
    volumes:
      - signoz_zookeeper_data:/bitnami/zookeeper
    healthcheck:
      test: ["CMD-SHELL", "curl -s -m 2 http://localhost:8080/commands/ruok | grep error | grep -q null"]
      interval: 15s
      timeout: 5s
      retries: 10

  clickhouse:
    <<: *common
    image: clickhouse/clickhouse-server:25.5.6
    tty: true
    environment:
      CLICKHOUSE_SKIP_USER_SETUP: "1"
    depends_on:
      signoz-init-clickhouse:
        condition: service_completed_successfully
      zookeeper-1:
        condition: service_healthy
    volumes:
      - ./clickhouse/config.xml:/etc/clickhouse-server/config.xml:ro
      - ./clickhouse/users.xml:/etc/clickhouse-server/users.xml:ro
      - ./clickhouse/custom-function.xml:/etc/clickhouse-server/custom-function.xml:ro
      - ./clickhouse/cluster.xml:/etc/clickhouse-server/config.d/cluster.xml:ro
      - signoz_clickhouse_scripts:/var/lib/clickhouse/user_scripts:ro
      - signoz_clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "0.0.0.0:8123/ping"]
      interval: 15s
      timeout: 5s
      retries: 20
    ulimits:
      nproc: 65535
      nofile:
        soft: 262144
        hard: 262144

  signoz:
    <<: *db-depend
    image: signoz/signoz:v0.127.1
    environment:
      SIGNOZ_ALERTMANAGER_PROVIDER: signoz
      SIGNOZ_TELEMETRYSTORE_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_SQLSTORE_SQLITE_PATH: /var/lib/signoz/signoz.db
      SIGNOZ_TOKENIZER_JWT_SECRET: ${SIGNOZ_TOKENIZER_JWT_SECRET:-development-only-signoz-tokenizer-secret-change-me}
    ports:
      - "${ACCOUNT_SIGNOZ_PORT:-3301}:8080"
    volumes:
      - signoz_sqlite_data:/var/lib/signoz
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8080/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 20

  signoz-otel-collector:
    <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.5
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate sync check &&
        /signoz-otel-collector --config=/etc/otel-collector-config.yaml
    environment:
      OTEL_RESOURCE_ATTRIBUTES: host.name=signoz-host,os.type=linux
      LOW_CARDINAL_EXCEPTION_GROUPING: "false"
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro

  signoz-telemetrystore-migrator:
    <<: *db-depend
    image: signoz/signoz-otel-collector:v0.144.5
    environment:
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_DSN: tcp://clickhouse:9000
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_CLUSTER: cluster
      SIGNOZ_OTEL_COLLECTOR_CLICKHOUSE_REPLICATION: "true"
      SIGNOZ_OTEL_COLLECTOR_TIMEOUT: 10m
    entrypoint: ["/bin/sh"]
    command:
      - -c
      - |
        /signoz-otel-collector migrate bootstrap &&
        /signoz-otel-collector migrate sync up &&
        /signoz-otel-collector migrate async up
    restart: on-failure

volumes:
  signoz_clickhouse_scripts:
  signoz_clickhouse_data:
  signoz_sqlite_data:
  signoz_zookeeper_data:

networks:
  account-network:
    driver: bridge
