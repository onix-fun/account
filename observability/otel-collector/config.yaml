receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
  file_log/gateway:
    include: [/var/log/account/account-gateway/*.log]
    start_at: end
    resource:
      service.name: account-gateway
      service.namespace: account
  file_log/profile:
    include: [/var/log/account/profile/*.log]
    start_at: end
    multiline:
      line_start_pattern: '^\d{4}-\d{2}-\d{2} '
    resource:
      service.name: profile
      service.namespace: account
  host_metrics:
    collection_interval: 30s
    scrapers:
      cpu: {}
      memory: {}
      disk: {}
      filesystem: {}
      load: {}
      network: {}
  redis:
    endpoint: ${env:IDENTITY_REDIS_HOST}:6379
    password: ${env:IDENTITY_REDIS_PASSWORD}
    collection_interval: 30s
  postgresql:
    endpoint: account-postgres:5432
    username: ${env:POSTGRES_USER}
    password: ${env:POSTGRES_PASSWORD}
    databases: [account]
    collection_interval: 30s
    tls:
      insecure: true
  nginx:
    endpoint: http://account-gateway:8090/nginx_status
    collection_interval: 30s
  prometheus:
    config:
      scrape_configs:
        - job_name: account-edge-otel-collector
          scrape_interval: 30s
          static_configs:
            - targets: [localhost:8888]
        - job_name: minio
          scrape_interval: 30s
          metrics_path: /minio/v2/metrics/cluster
          static_configs:
            - targets: [account-minio:9000]
        - job_name: clickhouse
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: [clickhouse:9363]
        - job_name: zookeeper
          scrape_interval: 30s
          metrics_path: /metrics
          static_configs:
            - targets: [zookeeper-1:9141]

processors:
  memory_limiter:
    check_interval: 2s
    limit_mib: 384
  resource/common:
    attributes:
      - key: service.namespace
        value: account
        action: upsert
      - key: deployment.environment
        value: ${env:DEPLOYMENT_ENVIRONMENT}
        action: upsert
  tail_sampling:
    decision_wait: 10s
    num_traces: 50000
    policies:
      - name: errors
        type: status_code
        status_code: {status_codes: [ERROR]}
      - name: slow
        type: latency
        latency: {threshold_ms: 500}
      - name: baseline
        type: probabilistic
        probabilistic: {sampling_percentage: 10}
  batch:
    send_batch_size: 4096
    timeout: 5s

exporters:
  otlp_grpc/signoz:
    endpoint: signoz-otel-collector:4317
    tls:
      insecure: true
    sending_queue:
      enabled: true
      storage: file_storage/queue
      queue_size: 10000
      num_consumers: 4
    retry_on_failure:
      enabled: true
      initial_interval: 1s
      max_interval: 30s
      max_elapsed_time: 0s

extensions:
  health_check:
    endpoint: 0.0.0.0:13133
  file_storage/queue:
    directory: /var/lib/otelcol/queue
    create_directory: true
    timeout: 10s

service:
  extensions: [health_check, file_storage/queue]
  telemetry:
    metrics:
      readers:
        - pull:
            exporter:
              prometheus:
                host: 0.0.0.0
                port: 8888
  pipelines:
    traces:
      receivers: [otlp]
      processors: [memory_limiter, resource/common, tail_sampling, batch]
      exporters: [otlp_grpc/signoz]
    metrics:
      receivers: [otlp, host_metrics, redis, postgresql, nginx, prometheus]
      processors: [memory_limiter, resource/common, batch]
      exporters: [otlp_grpc/signoz]
    logs:
      receivers: [otlp, file_log/gateway, file_log/profile]
      processors: [memory_limiter, resource/common, batch]
      exporters: [otlp_grpc/signoz]
