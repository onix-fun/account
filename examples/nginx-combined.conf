# Example Nginx configuration for Production
# This config combines Frontend and Backend on a single port (80)
# All application logic (Auth, CSRF, Rate Limits) is handled by Ktor on port 8080.

server {
    listen 80;
    server_name accaunt.example.com;

    # Static Frontend
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;

        # Security Headers
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    }

    # Backend API (Ktor)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Disable buffering for streaming (e.g. avatars)
        proxy_buffering off;
        client_max_body_size 10m;
    }
}
