services:
  account-gateway:
    image: ghcr.io/onix-fun/accaunt/gateway:${TAG:-latest}
    environment:
      IDENTITY_JWT_PUBLIC_KEY_PATH: /run/secrets/account-jwt-public.pem
      IDENTITY_JWT_ISSUER: account-service
      IDENTITY_JWT_AUDIENCE: account
      APP_ENV: production
      ACCOUNT_ALLOWED_ORIGINS: ${ACCOUNT_ALLOWED_ORIGINS:?required}
      ACCOUNT_HSTS_HEADER: "max-age=31536000; includeSubDomains"
      IDENTITY_INTERNAL_AUTH_SECRET: ${IDENTITY_INTERNAL_AUTH_SECRET:?required}
      ACCOUNT_SWAGGER_UI_ENABLED: "false"
      ACCOUNT_TRUSTED_PROXY_CIDRS: ${ACCOUNT_TRUSTED_PROXY_CIDRS:?required}
      ACCOUNT_DNS_RESOLVER: "127.0.0.11"
    expose:
      - "8089"
    volumes:
      - ./secrets/account-jwt-public.pem:/run/secrets/account-jwt-public.pem:ro
    depends_on:
      - profile
      - frontend
    networks:
      - account-network
    restart: unless-stopped

  frontend:
    image: ghcr.io/onix-fun/accaunt/frontend:${TAG:-latest}
    restart: unless-stopped
    networks:
      - account-network

  profile:
    image: ghcr.io/onix-fun/accaunt/backend:${TAG:-latest}
    environment:
      PROFILE_PORT: "8080"
      IDENTITY_JWT_ISSUER: account-service
      IDENTITY_JWT_AUDIENCE: account
      IDENTITY_JWT_PRIVATE_KEY_PATH: /run/secrets/account-jwt-private.pem
      IDENTITY_JWT_PUBLIC_KEY_PATH: /run/secrets/account-jwt-public.pem
      IDENTITY_ACCESS_TOKEN_EXP_MINUTES: "15"
      IDENTITY_REFRESH_TOKEN_EXP_DAYS: "30"
      IDENTITY_REFRESH_COOKIE_SECURE: "true"
      APP_ENV: production
      IDENTITY_OTP_HMAC_SECRET: ${IDENTITY_OTP_HMAC_SECRET:?required}
      IDENTITY_INTERNAL_AUTH_SECRET: ${IDENTITY_INTERNAL_AUTH_SECRET:?required}
      IDENTITY_SMTP_STARTTLS: "true"
      IDENTITY_DATABASE_JDBC_URL: ${DB_URL:-jdbc:postgresql://account-postgres:5432/account}
      IDENTITY_DATABASE_USERNAME: ${DB_USER:-account}
      IDENTITY_DATABASE_PASSWORD: ${DB_PASSWORD:-account}
      IDENTITY_REDIS_URL: redis://account-redis:6379
      IDENTITY_SMTP_HOST: ${IDENTITY_SMTP_HOST:?required}
      IDENTITY_SMTP_PORT: ${IDENTITY_SMTP_PORT:-587}
      IDENTITY_SMTP_FROM: ${IDENTITY_SMTP_FROM:?required}
      IDENTITY_SMTP_USERNAME: ${IDENTITY_SMTP_USERNAME:?required}
      IDENTITY_SMTP_PASSWORD: ${IDENTITY_SMTP_PASSWORD:?required}
      IDENTITY_S3_ENDPOINT: http://account-minio:9000
      IDENTITY_S3_PUBLIC_URL: ${PUBLIC_BASE_URL:?required}/api/avatars
      IDENTITY_S3_ACCESS_KEY: ${S3_ACCESS_KEY:-account-minio}
      IDENTITY_S3_SECRET_KEY: ${S3_SECRET_KEY:-account-minio-secret}
      IDENTITY_S3_BUCKET: avatars
    volumes:
      - ./secrets/account-jwt-private.pem:/run/secrets/account-jwt-private.pem:ro
      - ./secrets/account-jwt-public.pem:/run/secrets/account-jwt-public.pem:ro
    depends_on:
      account-postgres:
        condition: service_healthy
      account-redis:
        condition: service_healthy
      account-minio-init:
        condition: service_completed_successfully
    networks:
      - account-network
    restart: unless-stopped

  account-postgres:
    image: postgres:18
    environment:
      POSTGRES_DB: ${DB_NAME:-account}
      POSTGRES_USER: ${DB_USER:-account}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-account}
    volumes:
      - account_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-account} -d ${DB_NAME:-account}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - account-network
    restart: unless-stopped

  account-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - account_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - account-network
    restart: unless-stopped

  account-minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-account-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-account-minio-secret}
    volumes:
      - account_minio_data:/data
    networks:
      - account-network
    restart: unless-stopped

  account-minio-init:
    image: minio/mc:latest
    depends_on:
      - account-minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://account-minio:9000 ${S3_ACCESS_KEY:-account-minio} ${S3_SECRET_KEY:-account-minio-secret}; do sleep 2; done;
      /usr/bin/mc mb -p local/avatars || true;
      /usr/bin/mc anonymous set download local/avatars;
      "
    networks:
      - account-network

volumes:
  account_postgres_data:
  account_redis_data:
  account_minio_data:

networks:
  account-network:
    driver: bridge
