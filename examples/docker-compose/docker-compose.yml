name: account

x-backend-env: &backend-env
  ACCOUNT_ENV: ${ACCOUNT_ENV:-development}
  ACCOUNT_DATABASE_JDBC_URL: jdbc:postgresql://postgres:5432/account
  ACCOUNT_DATABASE_USERNAME: account
  ACCOUNT_DATABASE_PASSWORD: ${ACCOUNT_DATABASE_PASSWORD}
  ACCOUNT_REDIS_URL: redis://:${ACCOUNT_REDIS_PASSWORD}@redis:6379
  ACCOUNT_SMTP_HOST: mail
  ACCOUNT_SMTP_PORT: "1025"
  ACCOUNT_SMTP_FROM: ${ACCOUNT_SMTP_FROM:-no-reply@account.local}
  ACCOUNT_SMTP_STARTTLS: "false"
  ACCOUNT_S3_ENDPOINT: http://s3:9000
  ACCOUNT_S3_PUBLIC_URL: /api/avatars
  ACCOUNT_S3_ACCESS_KEY: ${ACCOUNT_S3_ACCESS_KEY}
  ACCOUNT_S3_SECRET_KEY: ${ACCOUNT_S3_SECRET_KEY}
  ACCOUNT_S3_BUCKET: avatars
  ACCOUNT_JWT_ISSUER: ${ACCOUNT_JWT_ISSUER:-account-service}
  ACCOUNT_JWT_AUDIENCE: ${ACCOUNT_JWT_AUDIENCE:-account}
  ACCOUNT_JWT_ACTIVE_KID: ${ACCOUNT_JWT_ACTIVE_KID:-dev}
  ACCOUNT_JWT_PRIVATE_KEY_FILE: /run/secrets/account-jwt-private.pem
  ACCOUNT_JWT_PUBLIC_KEY_FILE: /run/secrets/account-jwt-public.pem
  ACCOUNT_SECURITY_OTP_HMAC_SECRET: ${ACCOUNT_SECURITY_OTP_HMAC_SECRET}
  ACCOUNT_SECURITY_INTERNAL_AUTH_SECRET: ${ACCOUNT_SECURITY_INTERNAL_AUTH_SECRET}
  ACCOUNT_HTTP_ALLOWED_ORIGINS: ${ACCOUNT_HTTP_ALLOWED_ORIGINS:-http://localhost:8089}
  ACCOUNT_GRPC_ENABLED: "false"

services:
  account:
    image: ${ACCOUNT_IMAGE:-ghcr.io/onix-fun/account:latest}
    build:
      context: ../../
      dockerfile: Dockerfile
    ports: ["${ACCOUNT_HTTP_PORT:-8089}:8080"]
    command: serve --role=all
    environment:
      <<: *backend-env
      ACCOUNT_API_BASE_URL: /api
      ACCOUNT_FRONTEND_BASE_PATH: /
    volumes:
      - ./secrets/account-jwt-private.pem:/run/secrets/account-jwt-private.pem:ro
      - ./secrets/account-jwt-public.pem:/run/secrets/account-jwt-public.pem:ro
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
      s3-init: {condition: service_completed_successfully}
      mail: {condition: service_started}

  migrate:
    image: ${ACCOUNT_IMAGE:-ghcr.io/onix-fun/account:latest}
    build:
      context: ../../
      dockerfile: Dockerfile
    command: migrate
    environment: *backend-env
    volumes:
      - ./secrets/account-jwt-private.pem:/run/secrets/account-jwt-private.pem:ro
      - ./secrets/account-jwt-public.pem:/run/secrets/account-jwt-public.pem:ro
    depends_on:
      postgres: {condition: service_healthy}

  postgres:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: account
      POSTGRES_USER: account
      POSTGRES_PASSWORD: ${ACCOUNT_DATABASE_PASSWORD}
    volumes: [account_postgres:/var/lib/postgresql]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U account -d account"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "${ACCOUNT_REDIS_PASSWORD}"
    volumes: [account_redis:/data]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '${ACCOUNT_REDIS_PASSWORD}' ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  s3:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data
    environment:
      MINIO_ROOT_USER: ${ACCOUNT_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${ACCOUNT_S3_SECRET_KEY}
    volumes: [account_s3:/data]

  s3-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    entrypoint: ["/bin/sh", "-c"]
    command:
      - until mc alias set local http://s3:9000 "$$MINIO_ROOT_USER" "$$MINIO_ROOT_PASSWORD"; do sleep 2; done; mc mb -p local/avatars || true
    environment:
      MINIO_ROOT_USER: ${ACCOUNT_S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${ACCOUNT_S3_SECRET_KEY}
    depends_on: [s3]

  mail:
    image: mailhog/mailhog:v1.0.1
    ports: ["${ACCOUNT_MAIL_UI_PORT:-8026}:8025"]

volumes:
  account_postgres:
  account_redis:
  account_s3:
