apiVersion: apps/v1
kind: Deployment
metadata: {name: account-frontend}
spec:
  replicas: 2
  selector: {matchLabels: {app: account-frontend}}
  template:
    metadata: {labels: {app: account-frontend}}
    spec:
      containers:
        - name: frontend
          image: ghcr.io/onix-fun/accaunt/frontend:1.0.0
          env:
            - {name: ACCOUNT_API_BASE_URL, value: /api}
            - {name: ACCOUNT_FRONTEND_BASE_PATH, value: /}
          ports: [{containerPort: 80}]
---
apiVersion: v1
kind: Service
metadata: {name: account-frontend}
spec:
  selector: {app: account-frontend}
  ports: [{port: 80, targetPort: 80}]
---
apiVersion: batch/v1
kind: Job
metadata: {name: account-migrate}
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: ghcr.io/onix-fun/accaunt/backend:1.0.0
          args: [migrate]
          envFrom:
            - configMapRef: {name: account-config}
            - secretRef: {name: account-secrets}
          volumeMounts:
            - {name: jwt, mountPath: /run/secrets, readOnly: true}
      volumes:
        - name: jwt
          secret: {secretName: account-jwt-keys}
---
apiVersion: apps/v1
kind: Deployment
metadata: {name: account-backend}
spec:
  replicas: 2
  selector: {matchLabels: {app: account-backend}}
  template:
    metadata: {labels: {app: account-backend}}
    spec:
      containers:
        - name: backend
          image: ghcr.io/onix-fun/accaunt/backend:1.0.0
          args: [serve, --role=all]
          envFrom:
            - configMapRef: {name: account-config}
            - secretRef: {name: account-secrets}
          ports:
            - {name: http, containerPort: 8080}
            - {name: grpc, containerPort: 9097}
          readinessProbe: {httpGet: {path: /readyz, port: http}}
          livenessProbe: {httpGet: {path: /livez, port: http}}
          volumeMounts:
            - {name: jwt, mountPath: /run/secrets, readOnly: true}
            - {name: grpc-tls, mountPath: /run/grpc, readOnly: true}
      volumes:
        - name: jwt
          secret: {secretName: account-jwt-keys}
        - name: grpc-tls
          secret: {secretName: account-grpc-tls}
---
apiVersion: v1
kind: Service
metadata: {name: account-backend}
spec:
  selector: {app: account-backend}
  ports:
    - {name: http, port: 8080, targetPort: http}
    - {name: grpc, port: 9097, targetPort: grpc}
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: account
spec:
  ingressClassName: nginx
  rules:
    - host: account.example.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend: {service: {name: account-backend, port: {name: http}}}
          - path: /.well-known/jwks.json
            pathType: Exact
            backend: {service: {name: account-backend, port: {name: http}}}
          - path: /
            pathType: Prefix
            backend: {service: {name: account-frontend, port: {port: 80}}}
