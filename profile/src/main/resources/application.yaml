ktor:
  deployment:
    port: "$PROFILE_PORT:8080"
  application:
    modules:
      - profile.AppKt.module

identity:
  grpc:
    port: "$IDENTITY_GRPC_PORT:9097"
  jwt:
    issuer: "$IDENTITY_JWT_ISSUER:account-service"
    audience: "$IDENTITY_JWT_AUDIENCE:sparrow"
    private_key_path: "$IDENTITY_JWT_PRIVATE_KEY_PATH:/run/secrets/account-jwt-private.pem"
    public_key_path: "$IDENTITY_JWT_PUBLIC_KEY_PATH:/run/secrets/account-jwt-public.pem"
    access_token_exp_minutes: "$IDENTITY_ACCESS_TOKEN_EXP_MINUTES:15"
  session:
    refresh_token_exp_days: "$IDENTITY_REFRESH_TOKEN_EXP_DAYS:30"
    cookie_secure: "$IDENTITY_REFRESH_COOKIE_SECURE:false"
    cookie_domain: "$IDENTITY_COOKIE_DOMAIN:"
  registration:
    pending_ttl_seconds: "$IDENTITY_REGISTRATION_PENDING_TTL_SECONDS:3600"
    allow_in_memory_fallback: "$IDENTITY_REGISTRATION_ALLOW_IN_MEMORY_FALLBACK:false"

postgres:
  url: "$IDENTITY_DATABASE_JDBC_URL:jdbc:postgresql://localhost:5432/identity"
  user: "$IDENTITY_DATABASE_USERNAME:postgres"
  password: "$IDENTITY_DATABASE_PASSWORD:password"

redis:
  url: "$IDENTITY_REDIS_URL:redis://127.0.0.1:6379"

smtp:
  host: "$IDENTITY_SMTP_HOST:localhost"
  port: "$IDENTITY_SMTP_PORT:1025"
  from: "$IDENTITY_SMTP_FROM:no-reply@sparrow.local"

s3:
  endpoint: "$IDENTITY_S3_ENDPOINT:http://localhost:9000"
  public_url: "$IDENTITY_S3_PUBLIC_URL:http://localhost:9000"
  access_key: "$IDENTITY_S3_ACCESS_KEY:minioadmin"
  secret_key: "$IDENTITY_S3_SECRET_KEY:minioadmin"
  bucket: "$IDENTITY_S3_BUCKET:avatars"
