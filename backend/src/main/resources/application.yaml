ktor:
  deployment:
    port: 8080
  application:
    modules:
      - profile.AppKt.module

identity:
  security:
    otp_hmac_secret: "development-only-otp-secret-32-chars-long!!"
    internal_auth_secret: "development-only-internal-secret"
    trusted_proxy_cidrs: "0.0.0.0/0,::/0"
    allowed_origins: "http://localhost:5174,http://127.0.0.1:5174,http://localhost:8091"
  grpc:
    port: 9097
    enabled: false
    reflection: false
  jwt:
    issuer: "accaunt-service"
    audience: "accaunt"
    private_key_path: "/run/secrets/accaunt-jwt-private.pem"
    public_key_path: "/run/secrets/accaunt-jwt-public.pem"
    access_token_exp_minutes: 15
  session:
    refresh_token_exp_days: 30
    cookie_secure: false
  registration:
    pending_ttl_seconds: 3600
    allow_in_memory_fallback: false

postgres:
  url: "jdbc:postgresql://accaunt-postgres:5432/accaunt"
  user: "accaunt"
  password: "accaunt"

redis:
  url: "redis://:accaunt-redis-secret@accaunt-redis:6379"

smtp:
  host: "accaunt-mail"
  port: 1025
  from: "no-reply@accaunt.local"
  start_tls: false

app:
  environment: "development"

s3:
  endpoint: "http://accaunt-minio:9000"
  public_url: "/api/avatars"
  access_key: "accaunt-minio"
  secret_key: "accaunt-minio-secret"
  bucket: "avatars"
