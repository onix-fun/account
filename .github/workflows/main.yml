name: Account CI
on: [push, pull_request]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: onix-fun/profile, path: contract-profile }
      - uses: actions/checkout@v4
        with: { repository: onix-fun/media, path: contract-media }
      - run: |
          mkdir -p .contracts/{profile,media}
          cp -R contract-profile/api/proto .contracts/profile/proto
          cp -R contract-media/api/proto .contracts/media/proto
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: '21', cache: gradle }
      - run: ./gradlew --no-daemon test checkModuleBoundaries :app:shadowJar
        working-directory: backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: onix-fun/onix-design-system, path: onix-design-system }
      - run: ln -s "$GITHUB_WORKSPACE/onix-design-system" "$GITHUB_WORKSPACE/../onix-design-system"
      - uses: actions/setup-node@v4
        with: { node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json }
      - run: npm ci && npm test && npm run build
        working-directory: frontend

  container:
    needs: [backend, frontend]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with: { repository: onix-fun/profile, path: .contracts/profile-owner }
      - uses: actions/checkout@v4
        with: { repository: onix-fun/media, path: .contracts/media-owner }
      - uses: actions/checkout@v4
        with: { repository: onix-fun/onix-design-system, path: onix-design-system }
      - run: |
          mkdir -p .contracts/{profile,media}
          cp -R .contracts/profile-owner/api/proto .contracts/profile/proto
          cp -R .contracts/media-owner/api/proto .contracts/media/proto
      - run: docker build --build-context onix-design-system=onix-design-system -f Dockerfile.local .
