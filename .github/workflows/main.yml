name: Account Service CI/CD

on:
  push:
    branches: [main, rc]
  pull_request:
    branches: [main, rc]
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  id-token: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: onix-fun/accaunt

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Backend Tests
        uses: actions/setup-java@v4
        with: {java-version: '23', distribution: temurin, cache: maven}
      - run: mvn --batch-mode clean verify
        working-directory: backend

      - name: Frontend Tests
        uses: actions/setup-node@v4
        with: {node-version: '22', cache: npm, cache-dependency-path: frontend/package-lock.json}
      - run: npm ci && npm run test:coverage
        working-directory: frontend

  build-test-image:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build and Load
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          tags: account:test
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Export Image
        run: docker save account:test > account-test.tar
      - uses: actions/upload-artifact@v4
        with:
          name: account-test-image
          path: account-test.tar
          retention-days: 1

  e2e:
    needs: build-test-image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: account-test-image
      - run: docker load < account-test.tar
      
      - name: Setup E2E Environment
        run: |
          mkdir -p examples/docker-compose/secrets
          openssl genrsa -out examples/docker-compose/secrets/account-jwt-private.pem 2048
          openssl rsa -in examples/docker-compose/secrets/account-jwt-private.pem -pubout -out examples/docker-compose/secrets/account-jwt-public.pem
      
      - name: Run E2E
        env:
          ACCOUNT_IMAGE: account:test
          ACCOUNT_DATABASE_PASSWORD: test
          ACCOUNT_REDIS_PASSWORD: test
          ACCOUNT_S3_ACCESS_KEY: minioadmin
          ACCOUNT_S3_SECRET_KEY: minioadmin
          ACCOUNT_SECURITY_OTP_HMAC_SECRET: test
          ACCOUNT_SECURITY_INTERNAL_AUTH_SECRET: test
        run: |
          docker compose -f examples/docker-compose/docker-compose.yml up -d
          
          # Wait for readiness
          for i in $(seq 1 30); do
            if curl --fail --silent http://localhost:8089/.well-known/jwks.json; then
              echo "Service is ready"
              break
            fi
            [ "$i" = 30 ] && (docker compose -f examples/docker-compose/docker-compose.yml logs && exit 1)
            sleep 2
          done
          
          # Verify Public Endpoints (Port 8089 maps to 8080)
          curl --fail --silent http://localhost:8089/ > /dev/null
          
          # Verify Operational Endpoints are BLOCKED on public port
          curl --silent --head http://localhost:8089/livez | grep "404 Not Found"
          curl --silent --head http://localhost:8089/readyz | grep "404 Not Found"
          
          # Verify Operational Endpoints are AVAILABLE on internal port (direct container access)
          docker exec account-account-1 curl --fail --silent http://localhost:8081/livez > /dev/null
          docker exec account-account-1 curl --fail --silent http://localhost:8081/readyz > /dev/null

      - name: Stop E2E
        if: always()
        run: docker compose -f examples/docker-compose/docker-compose.yml down -v

  release:
    needs: e2e
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/rc')
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.semantic.outputs.new_release_published }}
      new_release_version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          working_directory: .
          extra_plugins: |
            @semantic-release/commit-analyzer
            @semantic-release/release-notes-generator
            @semantic-release/github
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish:
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.release.outputs.new_release_version }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=sha
      
      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin v0.53.0
          trivy image --exit-code 1 --severity HIGH,CRITICAL --ignore-unfixed "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"

      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
