name: Release Images

on:
  push:
    tags:
      - 'front_v*'
      - 'back_v*'
      - 'gate_v*'

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/${{ github.repository }}

jobs:
  verify:
    runs-on: ubuntu-latest
    env:
      DOCKER_API_VERSION: "1.44"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - uses: actions/setup-java@v4
        with:
          java-version: "23"
          distribution: temurin
          cache: maven
      - run: npm ci && npm run test:coverage && npm run build
        working-directory: frontend
      - run: mvn --batch-mode clean verify
        working-directory: backend
      - run: |
          docker build -t account-gateway:test gateway
          docker run --rm --entrypoint sh \
            -v "$PWD/gateway/tests:/work/tests:ro" -v "$PWD/gateway/lua:/work/lua:ro" -w /work \
            account-gateway:test -c 'for test in tests/test_browser_security.lua tests/test_jwt_auth.lua tests/test_session_status.lua; do resty "$test"; done'

  build-frontend:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/front_v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build static files
        working-directory: frontend
        run: npm run build

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/frontend
          tags: |
            type=match,pattern=front_v(.*),group=1
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: frontend
          file: frontend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ env.IMAGE_BASE }}/frontend@${{ steps.build.outputs.digest }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: true}
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${{ env.IMAGE_BASE }}/frontend@${{ steps.build.outputs.digest }}"

  build-backend:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/back_v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 23
        uses: actions/setup-java@v4
        with:
          java-version: '23'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn clean verify

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/backend
          tags: |
            type=match,pattern=back_v(.*),group=1
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ env.IMAGE_BASE }}/backend@${{ steps.build.outputs.digest }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: true}
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${{ env.IMAGE_BASE }}/backend@${{ steps.build.outputs.digest }}"

  build-gateway:
    needs: verify
    if: startsWith(github.ref, 'refs/tags/gate_v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_BASE }}/gateway
          tags: |
            type=match,pattern=gate_v(.*),group=1
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: gateway
          file: gateway/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true

      - uses: aquasecurity/trivy-action@0.28.0
        with: {image-ref: "${{ env.IMAGE_BASE }}/gateway@${{ steps.build.outputs.digest }}", severity: "HIGH,CRITICAL", exit-code: "1", ignore-unfixed: true}
      - uses: sigstore/cosign-installer@v3
      - run: cosign sign --yes "${{ env.IMAGE_BASE }}/gateway@${{ steps.build.outputs.digest }}"
