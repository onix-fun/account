include:
  - ../observability/signoz/compose.yml

services:
  profile:
    build:
      context: ../backend
      dockerfile: Dockerfile.dev
    env_file:
      - .env
    environment:
      PROFILE_PORT: "8080"
      IDENTITY_JWT_ISSUER: accaunt-service
      IDENTITY_JWT_AUDIENCE: accaunt
      IDENTITY_JWT_PRIVATE_KEY_PATH: /run/secrets/accaunt-jwt-private.pem
      IDENTITY_JWT_PUBLIC_KEY_PATH: /run/secrets/accaunt-jwt-public.pem
      IDENTITY_ACCESS_TOKEN_EXP_MINUTES: "15"
      IDENTITY_REFRESH_TOKEN_EXP_DAYS: "30"
      IDENTITY_OTP_HMAC_SECRET: "${IDENTITY_OTP_HMAC_SECRET:-development-only-otp-secret}"
      IDENTITY_TRUSTED_PROXY_CIDRS: "0.0.0.0/0,::/0"
      ACCOUNT_ALLOWED_ORIGINS: "http://localhost:5174,http://127.0.0.1:5174"
      APP_ENV: development
      IDENTITY_REFRESH_COOKIE_SECURE: "false"
      IDENTITY_DATABASE_JDBC_URL: ${IDENTITY_DATABASE_JDBC_URL:-jdbc:postgresql://accaunt-postgres:5432/accaunt}
      IDENTITY_DATABASE_USERNAME: ${POSTGRES_USER:-accaunt}
      IDENTITY_DATABASE_PASSWORD: ${POSTGRES_PASSWORD:-accaunt}
      IDENTITY_REDIS_URL: redis://:${IDENTITY_REDIS_PASSWORD:-accaunt-redis-secret}@accaunt-redis:6379
      IDENTITY_SMTP_HOST: accaunt-mail
      IDENTITY_SMTP_PORT: "1025"
      IDENTITY_S3_ENDPOINT: http://accaunt-minio:9000
      IDENTITY_S3_PUBLIC_URL: /api/avatars
      IDENTITY_S3_ACCESS_KEY: "${IDENTITY_S3_ACCESS_KEY:-accaunt-minio}"
      IDENTITY_S3_SECRET_KEY: "${IDENTITY_S3_SECRET_KEY:-accaunt-minio-secret}"
      IDENTITY_S3_BUCKET: avatars
      # JAVA_TOOL_OPTIONS: -javaagent:/otel/opentelemetry-javaagent.jar
      OTEL_SERVICE_NAME: profile
      OTEL_EXPORTER_OTLP_ENDPOINT: http://accaunt-otel-collector:4318
      OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
      OTEL_TRACES_EXPORTER: otlp
      OTEL_METRICS_EXPORTER: otlp
      OTEL_LOGS_EXPORTER: none
      OTEL_RESOURCE_ATTRIBUTES: service.namespace=accaunt,deployment.environment=local
      LOG_DIR: /var/log/accaunt/profile
    ports:
      - "8091:8080"
    volumes:
      - ./secrets/accaunt-jwt-private.pem:/run/secrets/accaunt-jwt-private.pem:ro
      - ./secrets/accaunt-jwt-public.pem:/run/secrets/accaunt-jwt-public.pem:ro
      - profile_logs:/var/log/accaunt/profile
    depends_on:
      accaunt-postgres:
        condition: service_healthy
      accaunt-redis:
        condition: service_healthy
      accaunt-minio-init:
        condition: service_completed_successfully
      accaunt-mail:
        condition: service_started
      accaunt-otel-collector:
        condition: service_started
    networks:
      - accaunt-network
    restart: unless-stopped

  accaunt-otel-storage-init:
    image: busybox:1.37.0
    user: "0:0"
    command: ["sh", "-c", "chown -R 10001:10001 /var/lib/otelcol"]
    volumes:
      - accaunt_otel_data:/var/lib/otelcol
    network_mode: none
    restart: "no"

  accaunt-otel-collector:
    image: otel/opentelemetry-collector-contrib:0.151.0
    command: ["--config=/etc/otelcol-contrib/config.yaml"]
    environment:
      DEPLOYMENT_ENVIRONMENT: development
      IDENTITY_REDIS_HOST: accaunt-redis
      IDENTITY_REDIS_PASSWORD: ${IDENTITY_REDIS_PASSWORD:-accaunt-redis-secret}
      POSTGRES_USER: ${POSTGRES_USER:-accaunt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accaunt}
    volumes:
      - ../observability/otel-collector/config.yaml:/etc/otelcol-contrib/config.yaml:ro
      - profile_logs:/var/log/accaunt/profile:ro
      - accaunt_otel_data:/var/lib/otelcol
    ports:
      - "${ACCOUNT_OTEL_GRPC_PORT:-4317}:4317"
      - "${ACCOUNT_OTEL_HTTP_PORT:-4318}:4318"
      - "${ACCOUNT_OTEL_HEALTH_PORT:-13133}:13133"
    depends_on:
      accaunt-otel-storage-init:
        condition: service_completed_successfully
      signoz-otel-collector:
        condition: service_started
      accaunt-minio:
        condition: service_started
      accaunt-postgres:
        condition: service_healthy
      accaunt-redis:
        condition: service_healthy
    networks:
      - accaunt-network
    restart: unless-stopped

  accaunt-postgres:
    image: postgres:18
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-accaunt}
      POSTGRES_USER: ${POSTGRES_USER:-accaunt}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-accaunt}
    volumes:
      - accaunt_postgres_data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U accaunt -d accaunt"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - accaunt-network
    restart: unless-stopped

  accaunt-redis:
    image: redis:7-alpine
    command: redis-server --appendonly yes --requirepass "${IDENTITY_REDIS_PASSWORD:-accaunt-redis-secret}"
    volumes:
      - accaunt_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - accaunt-network
    restart: unless-stopped

  accaunt-minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: "${IDENTITY_S3_ACCESS_KEY:-accaunt-minio}"
      MINIO_ROOT_PASSWORD: "${IDENTITY_S3_SECRET_KEY:-accaunt-minio-secret}"
      MINIO_PROMETHEUS_AUTH_TYPE: public
    ports:
      - "${ACCOUNT_MINIO_API_PORT:-9010}:9000"
      - "${ACCOUNT_MINIO_CONSOLE_PORT:-9011}:9001"
    volumes:
      - accaunt_minio_data:/data
    networks:
      - accaunt-network
    restart: unless-stopped

  accaunt-minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      - accaunt-minio
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://accaunt-minio:9000 ${IDENTITY_S3_ACCESS_KEY:-accaunt-minio} ${IDENTITY_S3_SECRET_KEY:-accaunt-minio-secret}; do sleep 2; done;
      /usr/bin/mc mb -p local/avatars || true;
      /usr/bin/mc anonymous set download local/avatars;
      "
    networks:
      - accaunt-network

  accaunt-mail:
    image: mailhog/mailhog:v1.0.1
    ports:
      - "${ACCOUNT_MAIL_SMTP_PORT:-1026}:1025"
      - "${ACCOUNT_MAIL_UI_PORT:-8026}:8025"
    networks:
      - accaunt-network
    restart: unless-stopped

volumes:
  profile_logs:
  accaunt_postgres_data:
  accaunt_redis_data:
  accaunt_minio_data:
  accaunt_otel_data:

networks:
  accaunt-network:
    driver: bridge
